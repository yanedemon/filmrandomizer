<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FILMRANDOMIZER</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <script>
      document.documentElement.dataset.theme = "dark";
    </script>
    <link rel="stylesheet" href="styles.css?v=20260618-ui-4">
  </head>
  <body>
    <svg class="xeno-svg-filters" aria-hidden="true" focusable="false">
      <filter id="phosphor-bloom" x="-35%" y="-35%" width="170%" height="170%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="1.35" result="softGlow"/>
        <feColorMatrix
          in="softGlow"
          result="acidGlow"
          type="matrix"
          values="0 0 0 0 0
                  0 1.35 0 0 0.55
                  0 0.55 0 0 0.22
                  0 0 0 0.86 0"
        />
        <feMerge>
          <feMergeNode in="acidGlow"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="xeno-noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="3" seed="11"/>
        <feColorMatrix type="saturate" values="0"/>
        <feComponentTransfer>
          <feFuncA type="table" tableValues="0 0.16"/>
        </feComponentTransfer>
      </filter>
    </svg>

    <main class="app-shell" id="appShell" data-state="boot" data-random-settings="closed">
      <section class="toolbar" aria-label="Панель приложения">
        <div class="user-panel" id="userPanel" hidden>
          <span id="currentUser"></span>
          <button class="ghost-button" id="logoutButton" type="button">Выйти</button>
        </div>

        <div class="app-logo" aria-label="FILMRANDOMIZER">
          <img src="assets/filmrandomizer-logo.png" alt="FILMRANDOMIZER">
        </div>

        <form class="add-form" id="movieForm" hidden>
          <label class="field">
            <span>Название фильма</span>
            <input
              id="movieTitle"
              name="movieTitle"
              type="search"
              placeholder="Например, Славные парни"
              autocomplete="off"
              required
            >
          </label>
          <div class="add-actions">
            <button class="primary-button" type="submit">Сохранить</button>
            <label class="ghost-button file-button" for="movieImportFile">Импорт TXT</label>
            <input id="movieImportFile" type="file" accept=".txt,text/plain" hidden>
          </div>
        </form>

        <div class="search-results" id="searchResults" hidden></div>
      </section>

      <section class="auth-section" id="authSection" aria-label="Авторизация">
        <form class="auth-form" id="authForm">
          <label class="field">
            <span>Логин</span>
            <input id="username" name="username" autocomplete="username" required>
          </label>
          <label class="field">
            <span>Пароль</span>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </label>
          <div class="auth-actions">
            <button class="primary-button" type="submit" data-action="login">Войти</button>
            <button class="ghost-button" type="submit" data-action="register">Создать</button>
          </div>
        </form>
        <div class="auth-message" id="authMessage" role="status" aria-live="polite"></div>
      </section>

      <div class="app-content" id="appContent" hidden>
        <section class="action-strip" aria-label="Выбор фильма">
          <div class="random-left">
            <div class="random-controls">
              <button class="pick-button" id="pickMovie" type="button">Выбрать из добавленных</button>
              <button class="pick-button secondary-pick-button" id="pickExternalMovie" type="button">Случайный фильм</button>
            </div>
            <div class="random-settings-access">
              <button class="ghost-button random-settings-toggle" id="randomSettingsToggle" type="button" aria-expanded="false" aria-controls="randomSettings" data-state="closed">Настройки выбора</button>
            </div>
            <div class="random-settings-panel" id="randomSettings" data-state="closed" hidden>
              <div class="random-setting-row">
                <label class="random-watched-toggle">
                  <input id="includeWatchedRandom" type="checkbox">
                  <span>Просмотренные</span>
                </label>
              </div>
              <div class="random-setting-row">
                <span class="random-setting-label">Длительность</span>
                <div class="duration-range" id="durationRangeGroup" aria-label="Диапазон длительности" data-state="active">
                  <label class="duration-option">
                    <input class="duration-range-input" type="radio" name="durationRange" value="any" checked>
                    <span>Любая</span>
                  </label>
                  <label class="duration-option">
                    <input class="duration-range-input" type="radio" name="durationRange" value="short">
                    <span>Короткий</span>
                  </label>
                  <label class="duration-option">
                    <input class="duration-range-input" type="radio" name="durationRange" value="standard">
                    <span>Стандартный</span>
                  </label>
                  <label class="duration-option">
                    <input class="duration-range-input" type="radio" name="durationRange" value="long">
                    <span>Длинный</span>
                  </label>
                </div>
              </div>
              <div class="random-setting-row">
                <button class="ghost-button compact-action-button" id="openRandomGenreModal" type="button">Настроить жанры</button>
                <span class="random-setting-summary" id="randomGenreSummary">Все жанры</span>
              </div>
              <div class="random-setting-row">
                <span class="random-setting-label">Рейтинг IMDb</span>
                <div class="rating-range" id="ratingRangeGroup" aria-label="Диапазон рейтинга IMDb">
                  <label class="rating-option">
                    <input class="rating-range-input" type="radio" name="ratingRange" value="any" checked>
                    <span>Любой</span>
                  </label>
                  <label class="rating-option">
                    <input class="rating-range-input" type="radio" name="ratingRange" value="low">
                    <span>Низкий</span>
                  </label>
                  <label class="rating-option">
                    <input class="rating-range-input" type="radio" name="ratingRange" value="medium">
                    <span>Средний</span>
                  </label>
                  <label class="rating-option">
                    <input class="rating-range-input" type="radio" name="ratingRange" value="high">
                    <span>Высокий</span>
                  </label>
                </div>
              </div>
            </div>
          </div>
          <div class="picked-movie" id="pickedMovie" aria-live="polite"></div>
          <div class="picked-details" id="pickedDetails" hidden></div>
        </section>

        <section class="status-row" aria-label="Статистика">
          <div>
            <strong id="totalCount">0</strong>
            <span>всего</span>
          </div>
          <div>
            <strong id="unwatchedCount">0</strong>
            <span>непросмотрено</span>
          </div>
          <div>
            <strong id="inCollectionsCount">0</strong>
            <span>в коллекциях</span>
          </div>
          <div>
            <strong id="watchedCount">0</strong>
            <span>просмотрено</span>
          </div>
        </section>

        <section class="collections-section" aria-labelledby="collectionsTitle">
          <div class="section-heading">
            <h2 id="collectionsTitle">Коллекции</h2>
            <div class="section-actions">
              <button class="ghost-button" id="editSelectedCollection" type="button" hidden>Настроить</button>
              <button class="primary-button" id="createCollection" type="button">Создать коллекцию</button>
            </div>
          </div>

          <div class="collection-list" id="collectionList"></div>
        </section>

        <section class="movie-section" aria-labelledby="cardsTitle">
          <div class="section-heading">
            <h2 id="cardsTitle">Все фильмы</h2>
          </div>
          <div class="library-search-row">
            <label class="field library-search-field">
              <span>Поиск</span>
              <input id="librarySearch" type="search" placeholder="Название, жанр, режиссёр">
            </label>
          </div>
          <details class="library-filter-panel">
            <summary>Фильтры</summary>
            <div class="library-filters" aria-label="Фильтры библиотеки">
              <label class="field">
                <span>Год</span>
                <select id="yearFilter">
                  <option value="">Все</option>
                </select>
              </label>
              <label class="field">
                <span>IMDb</span>
                <select id="ratingFilter">
                  <option value="">Любой</option>
                  <option value="low">до 5.5</option>
                  <option value="medium">5.6-7.5</option>
                  <option value="high">выше 7.6</option>
                </select>
              </label>
              <label class="field">
                <span>Жанр</span>
                <select id="genreFilter">
                  <option value="">Все</option>
                </select>
              </label>
              <label class="field">
                <span>Режиссёр</span>
                <select id="directorFilter">
                  <option value="">Все</option>
                </select>
              </label>
              <label class="filter-check">
                <input id="clearWatched" type="checkbox">
                <span>Скрыть просмотренные</span>
              </label>
              <button class="ghost-button compact-action-button" id="resetLibraryFilters" type="button">Сбросить</button>
            </div>
          </details>
          <div class="message" id="message" role="status" aria-live="polite"></div>
          <div class="cards-grid" id="cardsGrid"></div>
          <button class="ghost-button show-more" id="showMoreMovies" type="button" hidden>Показать ещё</button>
        </section>
      </div>
    </main>

    <div class="modal-backdrop" id="collectionModal" hidden>
      <section class="modal-panel collection-panel" role="dialog" aria-modal="true" aria-labelledby="collectionModalTitle">
        <div class="modal-header">
          <h3 id="collectionModalTitle">Коллекция</h3>
          <button class="icon-button" id="closeCollectionModal" type="button" aria-label="Закрыть">×</button>
        </div>
        <form class="modal-form" id="collectionForm">
          <label class="field">
            <span>Название коллекции</span>
            <input id="collectionName" placeholder="Например, На выходные" required>
          </label>
          <label class="field">
            <span>Поиск по фильмам</span>
            <input id="collectionMovieSearch" type="search" placeholder="Начните вводить название">
          </label>
          <div class="movie-picker modal-movie-picker" id="collectionMoviePicker"></div>
          <div class="modal-actions">
            <button class="primary-button" type="submit">Сохранить</button>
            <button class="ghost-button danger" id="deleteCollection" type="button" hidden>Удалить</button>
            <button class="ghost-button" id="cancelCollectionModal" type="button">Отмена</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop" id="importModal" hidden>
      <section class="modal-panel import-panel" role="dialog" aria-modal="true" aria-labelledby="importModalTitle">
        <div class="modal-header">
          <h3 id="importModalTitle">Импорт из TXT</h3>
          <button class="icon-button" id="closeImportModal" type="button" aria-label="Закрыть">×</button>
        </div>
        <div class="import-summary" id="importSummary"></div>
        <div class="import-review-list" id="importReviewList"></div>
        <div class="modal-actions">
          <button class="primary-button" id="confirmImport" type="button">Добавить выбранные</button>
          <button class="ghost-button" id="cancelImport" type="button">Отмена</button>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="plotModal" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="plotModalTitle">
        <div class="modal-header">
          <h3 id="plotModalTitle">Фильм</h3>
          <button class="icon-button" id="closePlotModal" type="button" aria-label="Закрыть">×</button>
        </div>
        <div class="plot-modal-body" id="plotModalBody"></div>
      </section>
    </div>

    <div class="modal-backdrop" id="randomGenreModal" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="randomGenreModalTitle">
        <div class="modal-header">
          <h3 id="randomGenreModalTitle">Жанры для выбора</h3>
          <button class="icon-button" id="closeRandomGenreModal" type="button" aria-label="Закрыть">×</button>
        </div>
        <div class="genre-modal-toolbar">
          <button class="ghost-button compact-action-button" id="selectAllRandomGenres" type="button">Все</button>
          <button class="ghost-button compact-action-button" id="clearRandomGenres" type="button">Снять</button>
        </div>
        <div class="movie-picker modal-movie-picker" id="randomGenrePicker"></div>
        <div class="modal-actions">
          <button class="primary-button" id="saveRandomGenres" type="button">Готово</button>
          <button class="ghost-button" id="cancelRandomGenres" type="button">Отмена</button>
        </div>
      </section>
    </div>

    <template id="movieCardTemplate">
      <article class="movie-card">
        <img class="poster" alt="">
        <div class="card-body">
          <div class="card-heading-line">
            <h3 class="title"></h3>
            <p class="director"></p>
            <div class="card-topline">
              <span class="year"></span>
              <span class="runtime"></span>
              <span class="rating"></span>
            </div>
          </div>
          <p class="plot"></p>
          <div class="card-actions">
            <label class="watched-toggle">
              <input class="watched-input" type="checkbox">
              <span>Просмотрено</span>
            </label>
            <button class="icon-button remove-button" type="button" aria-label="Удалить">×</button>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="app.js?v=20260618-ui-4"></script>
  </body>
</html>
