services:
  - type: web
    name: filmrandomizer
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py serve --host 0.0.0.0
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FILMRANDOMIZER_SESSION_TTL_SECONDS
        value: 2592000
      - key: FILMRANDOMIZER_PASSWORD_ITERATIONS
        value: 260000
